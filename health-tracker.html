const FS_BASE = "https://firestore.googleapis.com/v1/projects/" + FS_PROJECT + "/databases/(default)/documents/" + FS_COL + "/";
async function fsGet(key) {
  try {
    const res = await fetch(FS_BASE + FS_USER + "-" + key + "?key=" + FS_KEY);
    if (res.status === 404) return null;
    if (!res.ok) throw new Error("GET " + res.status);
    const json = await res.json();
    const raw = json.fields && json.fields.value && json.fields.value.stringValue;
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    throw e;
  }
}
async function fsSet(key, data) {
  try {
    const url = FS_BASE + FS_USER + "-" + key + "?key=" + FS_KEY;
    const body = {
      fields: {
        value: {
          stringValue: JSON.stringify(data)
        }
      }
    };
    const res = await fetch(url, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error("SET " + res.status + ": " + txt.slice(0, 100));

    throw e;

}

// ── STORAGE HOOK ──────────────────────────────────────────────────────────────
function usePersistedState(key, seed) {
  const CACHE_KEY = 'ht2026:' + key;

  // Instant render from localStorage cache
  const [data, setData] = useState(() => {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) return JSON.parse(raw);
    } catch {}
    return null;
  });
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    async function load() {
      try {
        const val = await fsGet(key);
        if (val !== null) {
          setData(val);
          try {
            localStorage.setItem(CACHE_KEY, JSON.stringify(val));
          } catch {}
        } else {
          // First run — seed Firestore
          await fsSet(key, seed);
          setData(seed);
          try {
            localStorage.setItem(CACHE_KEY, JSON.stringify(seed));
          } catch {}
        }
      } catch (e) {
        console.error("Firestore load error", key, e);
        // Fall back to cache or seed
        setData(d => d !== null ? d : seed);
      }
      setLoaded(true);
    }
    load();
  }, [key]);
  async function update(d) {
    setData(d);
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(d));
    } catch {}
    try {
      await fsSet(key, d);
    } catch (e) {
      console.error("Firestore write error", key, e);
    }
  }
  return [data, update, loaded];
}
